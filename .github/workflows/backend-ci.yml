name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'wright-brothers-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'wright-brothers-backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Use public NuGet feed
        run: |
          cat > NuGet.config << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            </packageSources>
          </configuration>
          EOF
        working-directory: wright-brothers-backend

      - name: Restore dependencies
        run: dotnet restore wright-brothers-backend/WrightBrothersApi.sln

      - name: Build
        run: dotnet build --no-restore wright-brothers-backend/WrightBrothersApi.sln

      - name: Run tests with coverage
        run: >
          dotnet test --no-build
          wright-brothers-backend/WrightBrothersApi.Tests/WrightBrothersApi.Tests.csproj
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Threshold=20
          /p:ThresholdType=line

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: wright-brothers-backend/WrightBrothersApi.Tests/coverage.cobertura.xml
